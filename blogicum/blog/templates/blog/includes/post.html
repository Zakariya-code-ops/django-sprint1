<div class="post-item">
    <ul>
        <li>Место: {{ post.location }}</li>
        <li>Дата: {{ post.date }}</li>
        <li>Категория:
            <a href="{% url 'blog:category_posts' post.category %}">
                {{ post.category }}
            </a>
        </li>
    </ul>

    {% if is_detail %}
        <p>{{ post.text|linebreaks }}</p>
    {% else %}
        <p>{{ post.text|slice:":20" }}</p>
    {% endif %}

    {% if not is_detail %}
        <a href="{% url 'blog:post_detail' post.id %}">
            Читать полный текст
        </a>
    {% endif %}

    <hr>
</div>
