\{% extends "base.html" %}

{% block content %}
    <h1>Лента записей</h1>
    
    {% for post in posts %}
        <div class="post-item">
            <ul>
                <li>Место: {{ post.location }}</li>
                <li>Дата: {{ post.date }}</li>
                <li>Категория: 
                    <a href="/category/{{ post.category }}/">
                        {{ post.category }}
                    </a>
                </li>
            </ul>
            
            <p>{{ post.text|slice:":50" }}...</p>
            
            <a href="/posts/{{ post.id }}/">Читать полный текст</a>
            <hr>
        </div>
    {% endfor %}
{% endblock %}
