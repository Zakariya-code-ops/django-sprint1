{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Блогикум{% endblock title %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
    <header class="bg-dark text-white py-3">
        <div class="container">
            <a href="{% url 'blog:index' %}" class="text-white text-decoration-none d-flex align-items-center">
                <img src="{% static 'images/logo.png' %}" alt="Логотип Блогикум" height="40" class="me-2">
                Блогикум
            </a>
            <nav>
                <a href="{% url 'blog:index' %}" class="text-white me-3">Лента</a>
                <a href="{% url 'pages:about' %}" class="text-white">О проекте</a>
                <a href="{% url 'pages:rules' %}" class="text-white ms-3">Правила</a>
            </nav>
        </div>
    </header>

    <main class="container my-4">
        {% block content %}{% endblock content %}
    </main>

    <footer class="bg-light text-center py-3 mt-5">
        <p>© 2024 Блогикум. Все права защищены.</p>
    </footer>
</body>
</html>
